name: mbiaconsulting
description: "Mbia Consulting Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # Networking
  http: ^1.2.2

  # Real-time chat
  socket_io_client: ^2.0.3+1

  # Token & session persistence
  shared_preferences: ^2.3.3

  # State management
  provider: ^6.1.2

  # Image picker (profile picture)
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/img1.jpeg
    - assets/img2.jpeg
    - assets/img3.jpeg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
